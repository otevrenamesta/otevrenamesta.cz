sections:
  member:
    title: Become a member
    description: If digitalization is essential to your local government, we will welcome you as a member of the Association. This will give you many benefits and allow you to influence the direction of our activities directly.
    join:
      title: Become a member
      description: "Application is available here (CZ):"
      button: Apply now
      url: "https://docs.google.com/document/d/14gJSg_6jgEqxnQO6cvHFFF_KvxjiftWu/edit"
    membership:
      title: Membership fee
      description: "The membership fee for municipalities is derived from the number of residents with permanent residence
                  in the municipality and it is always paid for the calendar year.
                  If a municipality or region becomes a member of the association during the year,
                  it pays a proportional fee according to the number of calendar months in which it is be a member.<br>
                  <br>
                  Municipalities with more than 100,000 resident: 1 CZK per resident;<br>
                  Municipalities with 10,000 – 100,000 resident: 2 CZK per resident;<br>
                  Municipalities with less than 10,000 resident: 3 CZK per resident.<br>
                  <br>
                  A flat membership fee for regions is set to 49,000 CZK per year.<br>
                  <br>
                  If you would like to try the membership out, we offer a starter membership that lasts 1 year.
                  As part of the starter membership, you can participate in membership meetings, internal association events,
                  and use the Continuous Vulnerability Scanning product.<br>
                  <br>
                  Starter membership: 5,000 CZK per year.
                  "
    benefits:
      title: Benefits of membership
      items:
        - title: Use of Products
          description: As part of their membership, members may use all products developed and provided by the association free of charge, along with standard support to ensure a user-friendly experience. They may also benefit from discounted rates for custom development, enhanced support services, or additional training.
        - title: Sharing know-how
          description: Members are invited to special events and training sessions where they can share know-how and practical experience about what does or doesn't work in the fields of digitalization and open software. They also have access to a discussion forum for exchanging experience and ideas regarding the operation and development of software and other products managed or prepared by Open Cities.
        - title: Influencing the direction
          description: Members of the association can directly influence its direction and activities, allowing them to clearly express their preferences and views on the digitalization of local government.
        - title: Continuous vulnerability scanning
          description: Members may also take advantage of the Continuous Vulnerability Scanning service free of charge. This service provides a basic layer of protection against the most common cybersecurity threats faced by local authorities. This service is not available to non-member municipalities or regions.
  services:
    title: Purchase of services
    description: If you are interested in any of our products and want to try out the cooperation before becoming a member of the Association, feel free to inquire separately about any of our services.
    pricing:
      title: Price list
      description: "The price list for our services is available here (CZ):"
      url: "https://api.www.otevrenamesta.cz/assets/6db95058-6ee7-44ba-b0c0-6c786b98dd03.pdf"
    benefits:
        title: Benefits
        items:
          - title: Uniqueness of projects
            description: Our services are specifically designed for local governments. We often create products directly with officials. This makes the products useful for other municipalities and regions.
          - title: Help from IT experts
            description: You'll have access to our local government IT product specialists to talk with about the issues and challenges that affect you.
          - title: No strings attached
            description: You can try our services with no obligation. You'll see how satisfied you'll be.
  opensource:
    title: Use of source codes
    description: To effectively combat the problem of vendor lock-in within local governments in the Czech Republic, each of our products is provided as open source. If you can implement and set up the software yourself, you can use the application code and deploy the product at your site without any obligation. Open source Open Cities can be found on <a href="https://github.com/otevrenamesta" target="_blank">GitHub</a> and <a href="https://gitlab.com/otevrenamesta" target="_blank">GitLab</a>.
joinUs:
  title: Cooperate with us
  description: We hope that you are interested in some of the possibilities of cooperation. Please get in touch with us via the contact form, and together we will work out how best to meet your requirements.

